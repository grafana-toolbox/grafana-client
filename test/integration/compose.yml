services:

  grafana:
    image: docker.io/grafana/grafana:${GRAFANA_VERSION:-12.3.4}
    ports:
      - "33333:3000"
    environment:
      GF_LOG_LEVEL: info
      #GF_LOG_LEVEL: debug

  cratedb:
    image: docker.io/crate/crate:nightly
    ports:
      - "4200:4200"
      - "5433:5432"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.29
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node

  graphite:
    image: docker.io/graphiteapp/graphite-statsd:1.1.10-5
    ports:
      - "8125:8125/udp"
      - "8126:8126"
      - "8080:8080"

  influxdb1:
    image: docker.io/influxdb:2.8
    ports:
      - 18086:8086
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadmin
      DOCKER_INFLUXDB_INIT_ORG: example
      DOCKER_INFLUXDB_INIT_BUCKET: default
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: admintoken

  influxdb2:
    image: docker.io/influxdb:2
    ports:
      - 28086:8086
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadmin
      DOCKER_INFLUXDB_INIT_ORG: example
      DOCKER_INFLUXDB_INIT_BUCKET: default
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: admintoken

  loki:
    image: docker.io/grafana/loki:3.6
    ports:
      - "3100:3100"
      - "9095:9095"

  mariadb:
    image: docker.io/mariadb:10
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root

  postgresql:
    image: docker.io/postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
