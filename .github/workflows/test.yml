name: Test

on:

  pull_request:
    paths:
      - '.github/workflows/**'
      - 'pyproject.toml'
      - 'setup.cfg'
      - '**.py'
      - 'test/integration/**'

  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
      - 'pyproject.toml'
      - 'setup.cfg'
      - '**.py'
      - 'test/integration/**'

  # Allow job to be triggered manually.
  workflow_dispatch:

# Cancel in-progress jobs when pushing to the same branch.
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [
          'ubuntu-latest',
        ]
        python-version: [
          '3.14',
        ]
        grafana-version:
          - "6.7.6"
          - "7.5.17"
          - "8.5.27"
          - "9.5.21"
          - "10.4.19"
          - "11.6.12"
          - "12.3.4"
          - "12.4.0"

        include:

          # Verify PyPy.
          - os: 'ubuntu-latest'
            python-version: 'pypy-3.11'
            grafana-version: '12.3.4'

          # Verify Python 3.7.
          - os: 'ubuntu-22.04'
            python-version: '3.7'
            grafana-version: '12.3.4'

    env:
      OS_TYPE: ${{ matrix.os }}
      PYTHON_VERSION: ${{ matrix.python-version }}
      GRAFANA_VERSION: ${{ matrix.grafana-version }}

    name: >-
      Python ${{ matrix.python-version }},
      Grafana ${{ matrix.grafana-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
          cache: 'pip'
          cache-dependency-path: 'setup.cfg'

      - name: Install dependencies for PyPy
        if: startsWith(matrix.python-version, 'pypy')
        run: |
          sudo apt-get install libxml2-dev libxslt-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --editable='.[test,develop]'

      - name: Check code style
        if: matrix.python-version != '3.7' && matrix.python-version != 'pypy-3.7'
        run: |
          poe lint

      - name: Run tests
        run: |
          poe test-coverage

      - name: Upload coverage results to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          env_vars: OS_TYPE,PYTHON_VERSION
          fail_ci_if_error: true
          flags: unittests
          name: codecov-umbrella
